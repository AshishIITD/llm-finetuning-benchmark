# Training configs for the benchmark

base_model: "meta-llama/Meta-Llama-3.1-8B-Instruct"
dataset: "tatsu-lab/alpaca"
output_dir: "./outputs"
hub_repo: "your-hf-username/llama3-finetuned-benchmark"

sft:
  learning_rate: 2e-5
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 512
  warmup_ratio: 0.05
  logging_steps: 10

lora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  bias: "none"
  learning_rate: 3e-4
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 512

qlora:
  r: 16
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj"]
  lora_dropout: 0.05
  bias: "none"
  learning_rate: 3e-4
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  max_seq_length: 512
  quantization:
    load_in_4bit: true
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true

dpo:
  beta: 0.1
  learning_rate: 5e-5
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  max_length: 512
  max_prompt_length: 256
